<!DOCTYPE html>
<!--
  /cookies.html — политика использования cookie.
  Работает по тому же принципу, что /privacy.html: тело тянется из БД через
  legal_get_active(kind='cookie'), рендерится мини-Markdown'ом из
  legal-renderer.js. Внизу — кнопка «Изменить выбор», вызывающая баннер.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Политика использования cookie | AlesSanna Ilusalong</title>
  <meta name="description" content="Какие cookie используются на сайте AlesSanna Ilusalong и как ими управлять." />
  <link rel="canonical" href="https://alessannailu.com/cookies.html" />
  <link rel="icon" href="assets/alessanna-logo-transparent.png" type="image/png" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="legal.css?v=20260420a" />
</head>
<body class="site-ilusalong legal-page">
  <header class="site-header" id="header">
    <div class="container header-inner">
      <a class="logo-link" href="/" aria-label="AlesSanna Ilusalong">
        <img class="logo-link__image" src="assets/alessanna-logo-transparent.png" alt="" width="1200" height="430" />
      </a>
      <div class="header-actions">
        <a href="/" class="nav-cta">На главную</a>
      </div>
    </div>
  </header>

  <main id="main" class="legal-main">
    <div class="container legal-container">
      <article class="legal-article" id="legal-article" data-kind="cookie" data-lang="ru">
        <p class="legal-loading">Загружаем актуальную версию…</p>
      </article>
      <p class="legal-meta" id="legal-meta"></p>
      <div class="legal-actions">
        <button type="button" id="legal-open-settings" class="legal-btn">Изменить мой выбор</button>
        <button type="button" id="legal-reset-consent" class="legal-btn legal-btn--ghost">Сбросить согласие</button>
      </div>
      <p class="legal-back"><a href="/">← Вернуться на главную</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <ul class="footer-links">
        <li><a href="/">Главная</a></li>
        <li><a href="/privacy.html">Приватность</a></li>
        <li><a href="/cookies.html">Cookie</a></li>
      </ul>
      <p class="footer-meta">Härma Keskus · Tallinna mnt 70 · Pärnu</p>
      <p class="footer-copy">© <span id="year"></span> AlesSanna Ilusalong</p>
    </div>
  </footer>

  <script src="supabase-public-config.js"></script>
  <script src="cookie-consent.js?v=20260420a" defer></script>
  <script src="legal-renderer.js?v=20260420a" defer></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    // На странице cookie-политики кнопки управления выбором.
    // Используют публичный API window.AlesSannaConsent (см. cookie-consent.js).
    window.addEventListener('load', function () {
      var openBtn = document.getElementById('legal-open-settings');
      var resetBtn = document.getElementById('legal-reset-consent');
      if (openBtn) openBtn.addEventListener('click', function () {
        if (window.AlesSannaConsent) window.AlesSannaConsent.openSettings();
      });
      if (resetBtn) resetBtn.addEventListener('click', function () {
        if (window.AlesSannaConsent) window.AlesSannaConsent.reset();
      });
    });
  </script>
</body>
</html>
