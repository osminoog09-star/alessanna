name: CI smoke

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  work-typecheck-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: work
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: work/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.invalid
          VITE_SUPABASE_ANON_KEY: ci-placeholder
